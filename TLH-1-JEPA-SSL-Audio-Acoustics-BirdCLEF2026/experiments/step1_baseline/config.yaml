audio:
  sample_rate: 32000
  n_mels: 128
  n_fft: 1024
  hop_length: 320
  duration: 5.0           # seconds per window

model:
  d_model: 256
  n_heads: 4
  n_layers: 4
  patch_size: 16
  dropout: 0.1

training:
  epochs: 15
  batch_size: 64
  lr: 1.0e-3
  weight_decay: 0.05
  warmup_epochs: 2

data:
  data_root: /kaggle/input/birdclef-2026
  num_workers: 4
  val_fraction: 0.1
